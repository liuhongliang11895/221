<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Part-Time Opportunity!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 26px;
      color: #333;
      margin-top: 50px;
    }
    p {
      font-size: 16px;
      color: #555;
      margin: 15px 0 30px;
    }
    .cta-btn {
      display: inline-block;
      padding: 15px 30px;
      background-color: #4CAF50;
      color: white;
      font-size: 18px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .cta-btn:hover {
      background-color: #45a049;
    }
    .trust {
      margin-top: 20px;
      font-size: 13px;
      color: #777;
    }
    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Start Your Part-Time Opportunity Today!</h1>
    <p>Flexible schedule, work from home, no experience needed.</p>

    <!-- CTA 按钮直接跳 WS -->
    <a href="https://wa.me/你的号码?text=Hi%20I%20want%20to%20start" target="_blank" class="cta-btn">
      Chat on WhatsApp
    </a>

    <div class="trust">
      We respect your privacy. Your information will not be shared.
    </div>

    <footer>
      © 2026 All Rights Reserved
    </footer>
  </div>

</body>
</html>
